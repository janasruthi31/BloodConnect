<!-- HERO -->
<section class="hero">
    <h2 class="fw-bold">Find Blood Donor</h2>
    <p class="mb-0">Search for available blood</p>
</section>

<!-- FORM -->
<div class="container py-5">
<div class="row justify-content-center">
<div class="col-lg-8">

<form class="card shadow p-4 mb-5" onsubmit="return validateSearchForm(event)">
<div class="row g-3">

<div class="col-md-6">
<label>Blood Group</label>
<select id="bloodGroup" class="form-select form-select-lg" required>
<option value="">Select Blood Group</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>O+</option>
<option>O-</option>
<option>AB+</option>
<option>AB-</option>
</select>
</div>

<div class="col-md-6">
<label>Units Required</label>
<input type="number" id="units" class="form-control form-control-lg" placeholder="Enter units" required>
</div>

<div class="col-md-6">
<label>State</label>
<select id="state" class="form-select form-select-lg" required>
<option value="">Select State</option>
<option>Tamil Nadu</option>
<option>Kerala</option>
<option>Karnataka</option>
<option>Andhra Pradesh</option>
</select>
</div>

<div class="col-md-6">
<label>City</label>
<input type="text" id="city" class="form-control form-control-lg" placeholder="Enter City" required>
</div>

<div class="col-md-6">
<label>Required Date</label>
<input type="date" id="date" class="form-control form-control-lg">
</div>

<div class="col-md-6">
<label>Urgency</label>
<select class="form-select form-select-lg">
<option>Normal</option>
<option>Emergency</option>
</select>
</div>

<div class="col-12 text-center mt-4">
<button type="submit" class="btn btn-danger btn-lg px-4">
Search Blood
</button>
</div>

</div>
</form>

</div>
</div>
</div>

<!-- JAVASCRIPT VALIDATION -->
<script>
function validateSearchForm(event) {
    event.preventDefault();

    var blood = document.getElementById("bloodGroup").value;
    var units = document.getElementById("units").value;
    var state = document.getElementById("state").value;
    var city = document.getElementById("city").value.trim();
    var date = document.getElementById("date").value;

    // Blood group
    if (blood === "") {
        alert("Please select a blood group.");
        return false;
    }

    // Units
    if (units <= 0) {
        alert("Units must be greater than 0.");
        return false;
    }

    // State
    if (state === "") {
        alert("Please select a state.");
        return false;
    }

    // City (letters only)
    var cityPattern = /^[A-Za-z ]+$/;
    if (!cityPattern.test(city)) {
        alert("City name should contain only letters.");
        return false;
    }

    // Date (not past)
    if (date !== "") {
        var today = new Date().toISOString().split("T")[0];
        if (date < today) {
            alert("Required date cannot be in the past.");
            return false;
        }
    }

    // Success
    alert("Search submitted successfully!");
    event.target.reset();

    return false;
}
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
