    background:#f8f9fa;

    background:#dc3545;
    color:white;
    padding:50px 20px;
    text-align:center;
    margin-top: 10px;

    border:none;
    border-radius:12px;

/* INPUT */

    border-radius:8px;
    padding:10px;
}

/* LABEL */

    font-weight:600;
    margin-bottom:5px;

/* PASSWORD COLORS */

.medium{color:orange;}
.strong{color:green;}

textarea {
  min-height: 80px;
}

  border-radius: 12px;
  overflow: hidden;
}

.dropdown-item {
  transition: 0.3s;
}

.dropdown-item:hover {
  background-color: #da3445;
  color: white;
  padding-left: 18px;
}
</style>
</head>

<body>

  <div class="container">

    <a class="navbar-brand d-flex align-items-center" href="index.html">

            Forms
          </a>

          <ul class="dropdown-menu dropdown-menu-end shadow border-0">
            <li><a class="dropdown-item py-2" href="register.html">📝 Donor Registration</a></li>

<!-- HERO -->
<section class="hero">
<h2 class="fw-bold">Donor Registration Form</h2>
<p>Become a lifesaver ❤️</p>
</section>

<!-- FORM -->
<div class="container py-5">
<div class="row justify-content-center">
<div class="col-lg-8">

<form class="card p-4 shadow" onsubmit="return validateForm()">

<div class="row g-3">

<!-- LEFT SIDE -->
<div class="col-md-6">
<label>Full Name</label>
<input type="text" id="name" class="form-control">
<small id="nameError" class="text-danger"></small>
</div>

<div class="col-md-6">
<label>Phone</label>
<input type="tel" id="phone" class="form-control">
<small id="phoneError" class="text-danger"></small>
</div>

<div class="col-md-6">
<label>Email</label>
<input type="email" id="email" class="form-control" onkeyup="validateEmail()">
<small id="emailError" class="text-danger"></small>
</div>

<div class="col-md-6">
<label>Password</label>
<input type="password" id="password" class="form-control" onkeyup="checkPassword()">
<p id="strength"></p>
</div>

<div class="col-md-6">
<label>Gender</label><br>
<div class="d-flex gap-3 mt-1">
  <div class="form-check">
    <input class="form-check-input" type="radio" name="gender">
    <label class="form-check-label">Male</label>
  </div>

  <div class="form-check">
    <input class="form-check-input" type="radio" name="gender">
    <label class="form-check-label">Female</label>
  </div>

  <div class="form-check">
    <input class="form-check-input" type="radio" name="gender">
    <label class="form-check-label">Other</label>
  </div>
</div>
</div>

<div class="col-md-6">
<label>Date of Birth</label>
<input type="date" id="dob" class="form-control">
<small id="dobError" class="text-danger"></small>
</div>

<div class="col-md-6">
<label>Age</label>
<input type="number" id="age" class="form-control" onkeyup="validateAge()">
<small id="ageError" class="text-danger"></small>
</div>

<div class="col-md-6">
<label>Blood Group</label>
<select id="bloodGroup" class="form-select form-select-lg">
    <option value="">Select Blood Group</option>
    <option>A+</option>
    <option>A-</option>
    <option>B+</option>
    <option>B-</option>
    <option>O+</option>
    <option>O-</option>
    <option>AB+</option>
    <option>AB-</option>
</select>
<small id="bloodError" class="text-danger"></small>
</div>

<div class="col-md-6">
<label>Available Time</label>
<select class="form-select">
<option>Morning</option>
<option>Afternoon</option>
<option>Evening</option>
</select>
</div>

<div class="col-md-6">
<label>Upload ID Proof</label>
<input type="file" class="form-control">
</div>


<div class="col-md-12">
<label>Weight</label>
<input type="range" class="form-range" min="40" max="120" value="60" oninput="showWeight(this.value)">
<p id="weightValue">Weight: 60 kg</p>
</div>

<div class="col-12">
<label>Feedback</label>
<textarea class="form-control"></textarea>
</div>

</div>

<button class="btn btn-danger w-100 mt-4">Submit</button>

</form>

</div>
</div>
</div>

<!-- JS -->
<script>

/* NAME */
function validateName(){
let name=document.getElementById("name").value;
let regex=/^[A-Za-z ]+$/;
if(!regex.test(name)){
document.getElementById("nameError").innerText="Only letters allowed";
return false;
}
document.getElementById("nameError").innerText="";
return true;
}

/* PHONE */
function validatePhone(){
let phone=document.getElementById("phone").value;
if(phone.length!=10){
document.getElementById("phoneError").innerText="Enter 10 digits";
return false;
}
document.getElementById("phoneError").innerText="";
return true;
}

function validateEmail(){

let email = document.getElementById("email").value;

// Step 1: check empty
if(email === ""){
document.getElementById("emailError").innerText = "Email is required";
return false;
}

// Step 2: pattern check
let pattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

if(!pattern.test(email)){
document.getElementById("emailError").innerText = "Enter valid email";
return false;
}

// Step 3: correct email
document.getElementById("emailError").innerText = "";
return true;
}

/* PASSWORD */
function checkPassword(){
let pass=document.getElementById("password").value;
let s=document.getElementById("strength");

if(pass.length<5){
s.innerText="Weak"; s.className="weak";
}
else if(pass.length<8){
s.innerText="Medium"; s.className="medium";
}
else{
s.innerText="Strong"; s.className="strong";
}
}

/* WEIGHT */
function showWeight(val){
document.getElementById("weightValue").innerText="Weight: "+val+" kg";
}

function validateDOB(){
let dob = document.getElementById("dob").value;

// Empty check
if(dob === ""){
document.getElementById("dobError").innerText = "Date of Birth is required";
return false;
}

// Convert input to Date
let birthDate = new Date(dob);
let today = new Date();

// Calculate age
let age = today.getFullYear() - birthDate.getFullYear();

// Adjust if birthday not yet reached this year
let m = today.getMonth() - birthDate.getMonth();
if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
    age--;
}

// Check minimum age
if(age < 18){
document.getElementById("dobError").innerText = "You must be at least 18 years old";
return false;
}

// If valid
document.getElementById("dobError").innerText = "";
return true;
}

function validateAge(){
let age = document.getElementById("age").value;

// Empty check
if(age.trim() === ""){
document.getElementById("ageError").innerText = "Age is required";
return false;
}

// Convert to number
age = Number(age);

// Age validation
if(age < 18){
document.getElementById("ageError").innerText = "You must be at least 18 years old";
return false;
}

// Optional: max age limit (example 60)
if(age > 60){
document.getElementById("ageError").innerText = "Age should be below 60";
return false;
}

// If valid
document.getElementById("ageError").innerText = "";
return true;
}

function validateBloodGroup(){

let blood = document.getElementById("bloodGroup").value;

if(blood === ""){
document.getElementById("bloodError").innerText = "Please select blood group";
return false;
}

document.getElementById("bloodError").innerText = "";
return true;
}

/* FINAL */
function validateForm(){
return validateName() && validatePhone() && validateDOB();
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
