<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Login - LifeLink Blood Bank</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<style>
  body {
    background: linear-gradient(135deg, #fff5f5, #ffd6d6, #fff);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .hero {
    background: #dc3545;
    color: white;
    padding: 35px;
    text-align: center;
    margin-top: 10px;
  }

  .login-card {
    border: none;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(220, 53, 69, 0.15);
    overflow: hidden;
  }

  .login-card .card-header {
    background: #dc3545;
    color: white;
    text-align: center;
    padding: 24px;
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    border: none;
  }

  .login-card .card-header i {
    font-size: 2.5rem;
    display: block;
    margin-bottom: 8px;
  }

  .login-card .card-body {
    padding: 36px;
    background: white;
  }

  label {
    font-weight: 600;
    color: #333;
    margin-bottom: 6px;
  }

  .form-control {
    border-radius: 8px;
    padding: 12px 16px;
    border: 1.5px solid #dee2e6;
    font-size: 15px;
    transition: border-color 0.2s;
  }

  .form-control:focus {
    border-color: #dc3545;
    box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.15);
  }

  .input-group-text {
    background: #f8f9fa;
    border: 1.5px solid #dee2e6;
    color: #dc3545;
    border-radius: 8px 0 0 8px;
  }

  .btn-login {
    background: #dc3545;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 13px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.5px;
    transition: background 0.2s, transform 0.1s;
  }

  .btn-login:hover {
    background: #b02a37;
    color: white;
    transform: translateY(-1px);
  }

  .badge-admin {
    background: rgba(220,53,69,0.1);
    color: #dc3545;
    border: 1px solid rgba(220,53,69,0.2);
    border-radius: 50px;
    padding: 5px 14px;
    font-size: 13px;
    font-weight: 600;
  }

  #errorMsg {
    display: none;
  }

  footer {
    text-align: center;
    padding: 20px;
    color: #888;
    font-size: 13px;
    margin-top: auto;
  }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-danger sticky-top shadow">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="index.html">
      <img src="blood.jpg" alt="logo" style="width:40px;" class="rounded-pill me-2">
      <span class="fw-bold">LifeLink</span>
    </a>
    <span class="badge-admin ms-auto">Admin Portal</span>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h2 class="fw-bold">Admin Login</h2>
  <p class="mb-0">Access the LifeLink Blood Bank Management Panel</p>
</div>

<!-- LOGIN FORM -->
<div class="container py-5 flex-grow-1">
  <div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">

      <div class="login-card card">
        <div class="card-header">
          <i class="bi bi-shield-lock-fill"></i>
          Admin Sign In
        </div>
        <div class="card-body">

          <div id="errorMsg" class="alert alert-danger d-flex align-items-center gap-2 mb-4">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span>Invalid credentials. Please try again.</span>
          </div>

          <div class="mb-4">
            <label class="form-label">Admin Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
              <input type="text" id="username" class="form-control" placeholder="Enter admin username">
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
              <input type="password" id="password" class="form-control" placeholder="Enter password">
              <button class="btn btn-outline-secondary" type="button" id="togglePwd" style="border-radius:0 8px 8px 0;">
                <i class="bi bi-eye" id="eyeIcon"></i>
              </button>
            </div>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="rememberMe">
              <label class="form-check-label fw-normal text-muted" for="rememberMe">Remember me</label>
            </div>
            <a href="#" class="text-danger text-decoration-none small fw-semibold">Forgot Password?</a>
          </div>

          <button class="btn btn-login w-100" onclick="adminLogin()">
            <i class="bi bi-box-arrow-in-right me-2"></i>Login to Dashboard
          </button>

          <hr class="my-4">

          <p class="text-center text-muted small mb-0">
            <i class="bi bi-info-circle me-1"></i>
            Demo: username <strong>admin</strong> / password <strong>admin123</strong>
          </p>

        </div>
      </div>

      <p class="text-center mt-3">
        <a href="index.html" class="text-danger text-decoration-none">
          <i class="bi bi-arrow-left me-1"></i>Back to Main Website
        </a>
      </p>

    </div>
  </div>
</div>

<footer>
  &copy; 2026 LifeLink Blood Bank. All rights reserved.
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Toggle password visibility
  document.getElementById('togglePwd').addEventListener('click', function () {
    var pwd = document.getElementById('password');
    var icon = document.getElementById('eyeIcon');
    if (pwd.type === 'password') {
      pwd.type = 'text';
      icon.className = 'bi bi-eye-slash';
    } else {
      pwd.type = 'password';
      icon.className = 'bi bi-eye';
    }
  });

  function adminLogin() {
    var username = document.getElementById('username').value.trim();
    var password = document.getElementById('password').value.trim();
    var errorMsg = document.getElementById('errorMsg');

    if (username === '' || password === '') {
      errorMsg.style.display = 'flex';
      errorMsg.querySelector('span').textContent = 'Please enter both username and password.';
      return;
    }

    // Demo credentials
    if (username === 'admin' && password === 'admin123') {
      errorMsg.style.display = 'none';
      window.location.href = 'admin-dashboard.html';
    } else {
      errorMsg.style.display = 'flex';
      errorMsg.querySelector('span').textContent = 'Invalid credentials. Please try again.';
      document.getElementById('password').value = '';
    }
  }

  // Allow Enter key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') adminLogin();
  });
</script>
</body>
</html>
